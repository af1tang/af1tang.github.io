# descriptions
title: af1tang.github.io
email: af1tang2@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  I dabble in various research topics. Here are some highlights.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://af1tang.github.io" # the base hostname & protocol for your site, e.g. http://example.com

# autho info 
